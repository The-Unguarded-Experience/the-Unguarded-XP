<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>House of Hazards</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="/Build/UnityLoader.js"></script>
    <script defer src="/js/unity-mod.js" type="text/javascript"></script>
    <script>
      var gameInstance = null;

      function toggleFullscreen() {
        if (gameInstance && typeof gameInstance.SetFullscreen === "function") {
          gameInstance.SetFullscreen(1);
        } else {
          console.warn("House of Hazards is still loading. Please wait before going fullscreen.");
        }
      }
    </script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer" style="width: 1280px; height: 720px;"></div>
      
      <script>
        if (typeof UnityLoader !== 'undefined') {
          gameInstance = UnityLoader.instantiate("gameContainer", "Build/HouseOfHazardsTwoPlayerGames.json", { onProgress: UnityProgress });
        } else {
          console.error("Critical Error: UnityLoader.js failed to load. Verify that Build/UnityLoader.js is online and paths are correct.");
        }
      </script>

      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="toggleFullscreen()"></div>
        <div class="title">House of Hazards</div>
      </div>
    </div>
  </body>
</html>
